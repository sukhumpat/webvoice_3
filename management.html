<!doctype html>
<html lang="th">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>จัดการ — ระบบเรียนรู้การออกเสียงด้วย AI</title>
  <link rel="icon" href="favicon.svg" type="image/svg+xml">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Prompt:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="assets/css/style.css" rel="stylesheet">
</head>
<body data-page="management">
  <div id="site-header"></div>

  <main>
    <section class="py-4 bg-cream">
      <div class="container">
        <h1 class="h3 mb-1" id="role-title">จัดการ</h1>
        <p class="text-muted mb-0" id="role-sub">กำลังตรวจสอบสิทธิ์...</p>
      </div>
    </section>

    <section class="py-4">
      <div class="container">
        <!-- ประตูตรวจสอบสิทธิ์ -->
        <div id="auth-gate" class="d-none"></div>

        <!-- เนื้อหาเมื่อ login แล้ว -->
        <div id="mgmt-content" class="d-none">

          <!-- ===== มุมมองผู้ฝึก (user) ===== -->
          <div id="user-view" class="d-none">
            <div id="user-report"></div>
          </div>

          <!-- ===== มุมมองผู้เชี่ยวชาญ (specialist) ===== -->
          <div id="specialist-view" class="d-none">
            <ul class="nav nav-pills mb-4 gap-2" role="tablist">
              <li class="nav-item"><button class="nav-link active" data-bs-toggle="pill" data-bs-target="#pane-scoring" type="button">⭐ ให้คะแนนเสียง</button></li>
              <li class="nav-item"><button class="nav-link" data-bs-toggle="pill" data-bs-target="#pane-words" type="button">📝 จัดการคำฝึก</button></li>
              <li class="nav-item"><button class="nav-link" data-bs-toggle="pill" data-bs-target="#pane-reports" type="button">📊 รายงานผู้ฝึก</button></li>
            </ul>
            <div class="tab-content">
              <div class="tab-pane fade show active" id="pane-scoring"><div id="tab-scoring"></div></div>
              <div class="tab-pane fade" id="pane-words"><div id="tab-words"></div></div>
              <div class="tab-pane fade" id="pane-reports"><div id="tab-reports"></div></div>
            </div>
          </div>

        </div>
      </div>
    </section>
  </main>

  <div id="site-footer"></div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="assets/js/config.js"></script>
  <script src="assets/js/supabase-client.js"></script>
  <script src="assets/js/layout.js"></script>
  <script src="assets/js/management.js"></script>
</body>
</html>
