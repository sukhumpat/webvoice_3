<!doctype html>
<html lang="th">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>เข้าสู่ระบบ / สมัครสมาชิก — ระบบเรียนรู้การออกเสียงด้วย AI</title>
  <link rel="icon" href="favicon.svg" type="image/svg+xml">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Prompt:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="assets/css/style.css" rel="stylesheet">
</head>
<body data-page="login">
  <div id="site-header"></div>

  <main>
    <section class="hero py-5">
      <div class="container py-4">
        <div class="auth-card">
          <div class="text-center mb-4">
            <img src="favicon.svg" width="64" height="64" alt="">
            <h1 class="h3 mt-2">ยินดีต้อนรับ</h1>
            <p class="text-muted">เข้าสู่ระบบเพื่อบันทึกผลการฝึกและดูรายงาน</p>
          </div>

          <div id="config-note" class="d-none"></div>

          <div class="card-soft p-4">
            <ul class="nav nav-pills nav-fill mb-4" role="tablist">
              <li class="nav-item" role="presentation">
                <button class="nav-link active" id="login-tab" data-bs-toggle="pill" data-bs-target="#login-pane" type="button" role="tab">เข้าสู่ระบบ</button>
              </li>
              <li class="nav-item" role="presentation">
                <button class="nav-link" id="register-tab" data-bs-toggle="pill" data-bs-target="#register-pane" type="button" role="tab">สมัครสมาชิก</button>
              </li>
            </ul>

            <div class="tab-content">
              <!-- LOGIN -->
              <div class="tab-pane fade show active" id="login-pane" role="tabpanel">
                <form id="login-form">
                  <div class="mb-3">
                    <label class="form-label fw-semibold">อีเมล</label>
                    <input type="email" class="form-control form-control-lg" id="login-email" required placeholder="you@email.com">
                  </div>
                  <div class="mb-3">
                    <label class="form-label fw-semibold">รหัสผ่าน</label>
                    <input type="password" class="form-control form-control-lg" id="login-password" required placeholder="••••••">
                  </div>
                  <div id="login-msg" class="d-none mb-3"></div>
                  <button class="btn btn-brand btn-lg w-100" type="submit">เข้าสู่ระบบ</button>
                </form>
              </div>

              <!-- REGISTER -->
              <div class="tab-pane fade" id="register-pane" role="tabpanel">
                <form id="register-form">
                  <div class="mb-3">
                    <label class="form-label fw-semibold">อีเมล</label>
                    <input type="email" class="form-control form-control-lg" id="reg-email" required placeholder="you@email.com">
                  </div>
                  <div class="mb-3">
                    <label class="form-label fw-semibold">รหัสผ่าน <small class="text-muted">(อย่างน้อย 6 ตัว)</small></label>
                    <input type="password" class="form-control form-control-lg" id="reg-password" required placeholder="••••••">
                  </div>
                  <label class="form-label fw-semibold">ฉันคือ...</label>
                  <div class="row g-2 mb-3">
                    <div class="col-6">
                      <div class="role-choice active text-center" data-role="user">
                        <div class="emoji">🧒</div>
                        <div class="fw-bold">ผู้ฝึกออกเสียง</div>
                        <small class="text-muted">เด็ก / ผู้ปกครอง</small>
                      </div>
                    </div>
                    <div class="col-6">
                      <div class="role-choice text-center" data-role="specialist">
                        <div class="emoji">👩‍⚕️</div>
                        <div class="fw-bold">ผู้เชี่ยวชาญ</div>
                        <small class="text-muted">คุณหมอ / นักแก้ไขการพูด</small>
                      </div>
                    </div>
                  </div>
                  <div id="register-msg" class="d-none mb-3"></div>
                  <button class="btn btn-accent btn-lg w-100" type="submit">สมัครสมาชิก</button>
                </form>
              </div>
            </div>
          </div>
          <p class="text-center text-muted mt-3"><small>การสมัครใช้เพียงอีเมลและรหัสผ่าน ไม่ต้องยืนยันอีเมล</small></p>
        </div>
      </div>
    </section>
  </main>

  <div id="site-footer"></div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="assets/js/config.js"></script>
  <script src="assets/js/supabase-client.js"></script>
  <script src="assets/js/layout.js"></script>
  <script src="assets/js/login.js"></script>
</body>
</html>
